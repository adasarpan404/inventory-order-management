# Render Blueprint — deploy at https://dashboard.render.com/blueprints
# Connect repo: https://github.com/adasarpan404/inventory-order-management

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory_db
    user: inventory

services:
  - type: web
    name: inventory-backend
    runtime: docker
    plan: free
    repo: https://github.com/adasarpan404/inventory-order-management
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: inventory-frontend
    runtime: static
    repo: https://github.com/adasarpan404/inventory-order-management
    branch: main
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html